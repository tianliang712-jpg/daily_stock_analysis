name: daily_stock_analysis

on:
  # ─── 定时触发（UTC时间，北京时间=UTC+8）───────────────────
  schedule:
    # 每个工作日 09:15 北京时间 = UTC 01:15（竞价监测）
    - cron: "15 1 * * 1-5"
    # 每个工作日 11:30 北京时间 = UTC 03:30（午间分析）
    - cron: "30 3 * * 1-5"
    # 每个工作日 15:30 北京时间 = UTC 07:30（收盘后分析）
    - cron: "30 7 * * 1-5"

  # ─── 手动触发（测试用）────────────────────────────────────
  workflow_dispatch:
    inputs:
      run_mode:
        description: "运行模式"
        required: false
        default: "full"
        type: choice
        options:
          - full       # 完整分析+AI点评+推送
          - pre_market # 竞价监测（09:15）
          - noon       # 午间分析（11:30）
          - test_only  # 仅采集数据，不推送

jobs:
  analyze:
    runs-on: ubuntu-latest

    steps:
      # ── Step 1: 检出代码 ────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Step 2: 配置 Python ─────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # ── Step 3: 安装依赖 ───────────────────────────────
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ── Step 4: 运行分析脚本 ────────────────────────────
      - name: Run stock analysis
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          WECHAT_WEBHOOK: ${{ secrets.WECHAT_WEBHOOK }}
          RUN_MODE: ${{ github.event.inputs.run_mode || 'full' }}
        run: |
          cd src
          python analyze.py

      # ── Step 5: 保存分析报告为 Artifact ─────────────────
      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: stock-report-${{ github.run_number }}
          path: src/report_latest.txt
          retention-days: 7

